openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: billing
    description: Accounts, entitlement and membership subscription
  - name: ask
    description: Natural-language question translation
  - name: feedback
    description: Bug reports and feature requests
  - name: ship
    description: The signed-in account's saved cosmonaut ship
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /me/entitlement:
    get:
      operationId: getEntitlement
      tags: [billing]
      summary: Current account entitlement
      description: >
        Returns whether the signed-in account is an active member and which
        researchers it has unlocked. Requires an authenticated session; the
        galaxy default researcher never calls this since it is always free.
      responses:
        "200":
          description: Entitlement state for the signed-in account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entitlement"
        "401":
          description: Not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /me/unlock:
    post:
      operationId: unlockResearcher
      tags: [billing]
      summary: Unlock a researcher for the signed-in member
      description: >
        Unlocks a researcher's galaxy for an active member. The first few
        researchers are included in the base membership; each one beyond that
        adds a recurring +$1/year add-on, charged immediately with proration.
        Idempotent — re-unlocking an already-unlocked researcher never charges.
        Returns the updated entitlement.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UnlockRequest"
      responses:
        "200":
          description: Updated entitlement state after the unlock
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entitlement"
        "400":
          description: Invalid researcher id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "402":
          description: Not a member, or the add-on charge could not be collected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /billing/checkout:
    post:
      operationId: createCheckout
      tags: [billing]
      summary: Start the membership subscription checkout
      description: >
        Creates a Stripe Checkout session (mode=subscription) for the $7/year
        full-access membership and returns its hosted URL. If the account is
        already entitled, returns alreadyEntitled=true and no URL.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutRequest"
      responses:
        "200":
          description: Checkout session created (or account already entitled)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSession"
        "401":
          description: Not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /billing/confirm:
    post:
      operationId: confirmCheckout
      tags: [billing]
      summary: Confirm a completed checkout session
      description: >
        Verifies a returned Stripe Checkout session directly against Stripe and,
        when paid and owned by the signed-in account, marks the account entitled.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmRequest"
      responses:
        "200":
          description: Updated entitlement state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entitlement"
        "401":
          description: Not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /me/ship:
    get:
      operationId: getShip
      tags: [ship]
      summary: The signed-in account's saved ship
      description: >
        Returns the seed of the ship the account has saved, or null if none has
        been saved yet. The ship look is derived deterministically from this
        seed on the client.
      responses:
        "200":
          description: The account's saved ship seed (or null)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShipState"
        "401":
          description: Not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      operationId: saveShip
      tags: [ship]
      summary: Save the account's ship
      description: >
        Persists the account's chosen ship seed so it follows them across
        devices and is broadcast to other cosmonauts. The seed is sanitized to a
        short alphanumeric string server-side.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveShipRequest"
      responses:
        "200":
          description: The saved ship seed (after sanitization)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShipState"
        "400":
          description: Invalid seed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /me/referral:
    get:
      operationId: getReferral
      tags: [referral]
      summary: The signed-in account's referral link info
      description: >
        Returns the signed-in account's stable referral code and how many
        accounts have signed up through their link. The code is generated on
        first call and is permanent.
      responses:
        "200":
          description: The account's referral code and signup count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralInfo"
        "401":
          description: Not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /me/referral/claim:
    post:
      operationId: claimReferral
      tags: [referral]
      summary: Attribute the signed-in (newly created) account to a referrer
      description: >
        Called right after sign-up with a referral code captured from a `?ref=`
        link. Attributes this account to the referrer — but only for genuinely
        new accounts and only once (the attribution is permanent). Safe to call
        when ineligible: it simply returns the account's own referral info
        unchanged.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimReferralRequest"
      responses:
        "200":
          description: The account's own referral info after the best-effort claim
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralInfo"
        "400":
          description: Missing referral code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /ask/translate:
    post:
      operationId: translateAsk
      tags: [ask]
      summary: Translate a natural-language question into a structured query spec
      description: >
        Uses the LLM purely as a translator: it converts a plain-English
        question about a scientist's corpus into a validated, structured query
        spec. The model never computes counts or lists — the browser runs the
        returned spec deterministically over the locally-baked data. Only the
        question text and a description of the data shape are sent; no actual
        paper data leaves the browser.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AskRequest"
      responses:
        "200":
          description: A structured query spec for the browser to execute
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AskQuery"
        "502":
          description: The translation model is unreachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /feedback/issue:
    post:
      operationId: reportFeedback
      tags: [feedback]
      summary: File a bug report or feature request as a Linear issue
      description: >
        Creates an issue in the project's Linear workspace from a
        visitor's message. Used by the Ask panel's "report a bug / request a
        feature" affordance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedbackRequest"
      responses:
        "201":
          description: The Linear issue was created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Linear is unreachable or issue creation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Entitlement:
      type: object
      properties:
        entitled:
          type: boolean
          description: Whether the account is an active full-access member.
        email:
          type: string
          nullable: true
          description: The account's primary email, when known.
        includedSlots:
          type: integer
          description: How many researcher unlocks the base membership includes.
        unlocked:
          type: array
          description: OpenAlex author ids this account has unlocked, oldest first.
          items:
            type: string
      required:
        - entitled
        - includedSlots
        - unlocked
    UnlockRequest:
      type: object
      properties:
        author:
          type: string
          description: OpenAlex author id of the researcher to unlock.
      required:
        - author
    CheckoutSession:
      type: object
      properties:
        url:
          type: string
          nullable: true
          description: Hosted Stripe Checkout URL to redirect to, when a session was created.
        alreadyEntitled:
          type: boolean
          description: True when the account is already an active member; no checkout was created.
      required:
        - alreadyEntitled
    CheckoutRequest:
      type: object
      properties:
        author:
          type: string
          nullable: true
          description: >
            OpenAlex author id of the scientist currently being explored, so the
            post-payment redirect returns to that galaxy instead of the default.
    ConfirmRequest:
      type: object
      properties:
        sessionId:
          type: string
          description: The Stripe Checkout session id returned on the success redirect.
      required:
        - sessionId
    ShipState:
      type: object
      properties:
        shipSeed:
          type: string
          nullable: true
          description: The account's saved ship seed, or null if none is saved.
      required:
        - shipSeed
    SaveShipRequest:
      type: object
      properties:
        seed:
          type: string
          description: The ship seed to save (sanitized to short alphanumeric server-side).
      required:
        - seed
    AskField:
      type: object
      description: A single field of the data shape (name + type), no actual data.
      properties:
        name:
          type: string
        type:
          type: string
        description:
          type: string
      required:
        - name
        - type
    AskRequest:
      type: object
      properties:
        question:
          type: string
          description: The visitor's plain-English question about the corpus.
        fields:
          type: array
          description: The shape of a paper record (field names and types only).
          items:
            $ref: "#/components/schemas/AskField"
        domains:
          type: array
          description: The research-domain (category) names present in this galaxy.
          items:
            type: string
      required:
        - question
    AskQuery:
      type: object
      description: >
        A structured query the browser executes deterministically over the local
        data. The model only fills these slots; it never returns numbers or lists.
      properties:
        intent:
          type: string
          enum: [count, list, feedback]
          description: >
            What the visitor wants: "count" for a number/how-many, "list" for
            matching papers, or "feedback" when they are reporting a bug or
            requesting a feature/improvement rather than asking about the corpus.
        feedbackKind:
          type: string
          enum: [bug, feature]
          nullable: true
          description: >
            When intent is "feedback", whether the message is a bug report or a
            feature request. Null otherwise.
        text:
          type: string
          nullable: true
          description: Keyword to match across a paper's title, topic, field and venue.
        coAuthor:
          type: string
          nullable: true
          description: Co-author name substring to match.
        minYear:
          type: integer
          nullable: true
        maxYear:
          type: integer
          nullable: true
        minCitations:
          type: integer
          nullable: true
        maxCitations:
          type: integer
          nullable: true
        minCoAuthors:
          type: integer
          nullable: true
          description: Minimum number of co-authors (collaborators) on a paper.
        maxCoAuthors:
          type: integer
          nullable: true
        sortBy:
          type: string
          enum: [citations, year, coAuthors]
          nullable: true
        sortDir:
          type: string
          enum: [asc, desc]
          nullable: true
        limit:
          type: integer
          nullable: true
          description: Max papers to show for a list answer.
        unsupported:
          type: boolean
          description: True when the question cannot be expressed as a query over this data.
      required:
        - intent
    FeedbackRequest:
      type: object
      properties:
        kind:
          type: string
          enum: [bug, feature]
          description: Whether this is a bug report or a feature request.
        message:
          type: string
          description: The visitor's message.
      required:
        - kind
        - message
    FeedbackResult:
      type: object
      properties:
        url:
          type: string
          description: The URL of the created Linear issue.
        number:
          type: integer
          description: The Linear issue number (per-team).
      required:
        - url
        - number
    ReferralInfo:
      type: object
      properties:
        code:
          type: string
          description: The account's stable referral code, used as `?ref=<code>`.
        referredCount:
          type: integer
          description: How many accounts have signed up through this account's link.
      required:
        - code
        - referredCount
    ClaimReferralRequest:
      type: object
      properties:
        code:
          type: string
          description: The referral code captured from the `?ref=` link at sign-up.
      required:
        - code
    Error:
      type: object
      properties:
        error:
          type: string
      required:
        - error
