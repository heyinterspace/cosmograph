kind = "web"
previewPath = "/"
title = "Cosmograph"
version = "1.0.0"
id = "artifacts/galaxy"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23665

[services.development]
run = "pnpm --filter @workspace/cosmograph run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cosmograph", "run", "build" ]
publicDir = "artifacts/cosmograph/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23665"
BASE_PATH = "/"
